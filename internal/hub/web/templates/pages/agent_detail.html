<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent — zlaw</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; background: #f9fafb; color: #111; line-height: 1.5; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    header { background: #1e293b; color: #e2e8f0; padding: 0 1.5rem; }
    header nav { display: flex; align-items: center; height: 3rem; gap: 2rem; }
    header .logo { font-weight: 700; font-size: 1rem; color: #f8fafc; }
    header nav a { color: #94a3b8; }
    header nav a:hover { color: #f8fafc; }
    header nav a.active { color: #f8fafc; font-weight: 600; }
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    .page-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
    .page-header .back { font-size: 0.85rem; color: #64748b; }
    .badge { display: inline-flex; align-items: center; padding: 0.2rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
    .badge-running { background: #dcfce7; color: #166534; }
    .badge-connected { background: #dcfce7; color: #166534; }
    .badge-disconnected { background: #fee2e2; color: #991b1b; }
    .badge-cap { background: #e0f2fe; color: #0c4a6e; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 1.5rem; overflow: hidden; }
    .card-header { padding: 1rem 1.25rem; background: #f8fafc; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
    .card-header h2 { font-size: 1rem; font-weight: 600; color: #374151; }
    .card-body { padding: 1.25rem; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
    .stat { background: #f8fafc; border-radius: 6px; padding: 1rem; }
    .stat .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat .value { font-size: 1.1rem; font-weight: 600; margin-top: 0.25rem; color: #1e293b; }
    .mono { font-family: ui-monospace, monospace; font-size: 0.85em; }
    .section-nav { display: flex; gap: 0; border-bottom: 1px solid #e5e7eb; margin-bottom: 1rem; }
    .section-tab { padding: 0.75rem 1.25rem; font-weight: 500; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .section-tab:hover { color: #374151; }
    .section-tab.active { color: #2563eb; border-bottom-color: #2563eb; }
    .section-content { display: none; }
    .section-content.active { display: block; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.75rem 1rem; border-bottom: 1px solid #e5e7eb; }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid #f1f5f9; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }
    .tool-item, .skill-item { padding: 0.875rem 1rem; border-bottom: 1px solid #f1f5f9; }
    .tool-item:last-child, .skill-item:last-child { border-bottom: none; }
    .tool-name, .skill-name { font-weight: 600; font-family: ui-monospace, monospace; color: #2563eb; }
    .tool-desc, .skill-desc { color: #64748b; font-size: 0.85rem; margin-top: 0.25rem; }
    .file-row { display: flex; align-items: center; padding: 0.75rem 1rem; border-bottom: 1px solid #f1f5f9; }
    .file-row:last-child { border-bottom: none; }
    .file-row:hover { background: #f8fafc; }
    .file-icon { margin-right: 0.75rem; color: #64748b; }
    .file-name { flex: 1; font-weight: 500; color: #374151; }
    .file-meta { color: #64748b; font-size: 0.8rem; }
    .file-meta .mono { font-family: ui-monospace, monospace; font-size: 0.85em; }
    .loading { color: #64748b; text-align: center; padding: 2rem; }
    .error { color: #dc2626; text-align: center; padding: 2rem; }
    .no-data { color: #94a3b8; text-align: center; padding: 1rem; }
    footer { text-align: center; padding: 2rem; color: #94a3b8; font-size: 0.8rem; }
  </style>
</head>
<body>
  <header>
    <nav>
      <span class="logo">zlaw</span>
      <a href="/">Overview</a>
      <a href="/tools">Hub Tools</a>
      <a href="/agents" class="active">Agents</a>
      <a href="/audit">Audit Log</a>
    </nav>
  </header>
  <main>
    <div class="page-header">
      <a href="/agents" class="back">← All Agents</a>
      <h1 id="agent-name">Loading...</h1>
    </div>

    <div id="agent-detail">
      <p class="loading">Loading agent details...</p>
    </div>
  </main>
  <footer>
    zlaw hub — read-only
  </footer>
  <script>
    // Get agent ID from URL path: /agents/{agentID}
    const pathParts = window.location.pathname.split('/');
    const agentID = decodeURIComponent(pathParts[3] || '');

    document.getElementById('agent-name').textContent = agentID;
    document.title = agentID + ' — zlaw';

    async function loadAgent() {
      try {
        const res = await fetch('/api/agents/' + encodeURIComponent(agentID));
        if (!res.ok) throw new Error('Agent not found');
        const data = await res.json();
        renderAgent(data);
      } catch (e) {
        document.getElementById('agent-detail').innerHTML = '<p class="error">Error loading agent: ' + e.message + '</p>';
      }
    }

    function renderAgent(agent) {
      const statusBadge = agent.Running 
        ? '<span class="badge badge-running">running</span>'
        : agent.Status === 'connected'
          ? '<span class="badge badge-connected">connected</span>'
          : '<span class="badge badge-disconnected">' + (agent.Status || 'unknown') + '</span>';

      const capabilities = (agent.Capabilities || []).map(c => 
        '<span class="badge badge-cap">' + c + '</span>'
      ).join(' ');

      document.getElementById('agent-detail').innerHTML = `
        <div class="card">
          <div class="card-body">
            <div class="stat-grid">
              <div class="stat">
                <div class="label">ID</div>
                <div class="value mono">${agent.Name || '—'}</div>
              </div>
              <div class="stat">
                <div class="label">Status</div>
                <div class="value">${statusBadge}</div>
              </div>
              <div class="stat">
                <div class="label">PID</div>
                <div class="value mono">${agent.PID || '—'}</div>
              </div>
              <div class="stat">
                <div class="label">Version</div>
                <div class="value mono">${agent.Version || '—'}</div>
              </div>
              <div class="stat">
                <div class="label">Last Heartbeat</div>
                <div class="value mono">${agent.LastHeartbeat ? new Date(agent.LastHeartbeat).toLocaleString() : '—'}</div>
              </div>
            </div>
            ${capabilities ? '<div style="margin-top:1rem;"><div class="label" style="font-size:0.75rem;color:#64748b;text-transform:uppercase;margin-bottom:0.5rem;">Capabilities</div>' + capabilities + '</div>' : ''}
          </div>
        </div>

        <div class="section-nav">
          <div class="section-tab active" data-section="tools">Tools</div>
          <div class="section-tab" data-section="sessions">Sessions</div>
          <div class="section-tab" data-section="files">Files</div>
          <div class="section-tab" data-section="skills">Skills</div>
        </div>

        <div id="section-tools" class="section-content active">
          <div class="card">
            <div class="card-header"><h2>Available Tools</h2></div>
            <div id="tools-list"><p class="loading">Loading...</p></div>
          </div>
        </div>

        <div id="section-sessions" class="section-content">
          <div class="card">
            <div class="card-header"><h2>Sessions</h2></div>
            <div id="sessions-list"><p class="loading">Loading...</p></div>
          </div>
        </div>

        <div id="section-files" class="section-content">
          <div class="card">
            <div class="card-header"><h2>Workspace Files</h2></div>
            <div id="files-list"><p class="loading">Loading...</p></div>
          </div>
        </div>

        <div id="section-skills" class="section-content">
          <div class="card">
            <div class="card-header"><h2>Skills</h2></div>
            <div id="skills-list"><p class="loading">Loading...</p></div>
          </div>
        </div>
      `;

      // Tab switching
      document.querySelectorAll('.section-tab').forEach(tab => {
        tab.addEventListener('click', () => showSection(tab.dataset.section));
      });

      // Load section data
      loadTools();
      loadSessions();
      loadFiles();
      loadSkills();
    }

    function showSection(section) {
      document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-section="' + section + '"]').classList.add('active');
      document.querySelectorAll('.section-content').forEach(c => c.classList.remove('active'));
      document.getElementById('section-' + section).classList.add('active');
    }

    async function loadTools() {
      try {
        const res = await fetch('/api/agents/' + encodeURIComponent(agentID) + '/tools');
        if (!res.ok) throw new Error();
        const data = await res.json();
        renderTools(data.tools || []);
      } catch (e) {
        document.getElementById('tools-list').innerHTML = '<p class="error">Failed to load tools</p>';
      }
    }

    function renderTools(tools) {
      const container = document.getElementById('tools-list');
      if (!tools.length) {
        container.innerHTML = '<p class="no-data">No tools available</p>';
        return;
      }
      container.innerHTML = tools.map(t => `
        <div class="tool-item">
          <div class="tool-name">${t.name}</div>
          <div class="tool-desc">${t.description || '—'}</div>
        </div>
      `).join('');
    }

    async function loadSessions() {
      try {
        const res = await fetch('/api/agents/' + encodeURIComponent(agentID) + '/sessions');
        if (!res.ok) throw new Error();
        const data = await res.json();
        renderSessions(Array.isArray(data) ? data : [data]);
      } catch (e) {
        document.getElementById('sessions-list').innerHTML = '<p class="error">Failed to load sessions</p>';
      }
    }

    function renderSessions(sessions) {
      const container = document.getElementById('sessions-list');
      if (!sessions.length) {
        container.innerHTML = '<p class="no-data">No sessions found</p>';
        return;
      }
      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Session ID</th>
              <th>Channel</th>
              <th>Messages</th>
              <th>Created</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            ${sessions.map(s => `
              <tr>
                <td class="mono">${s.session_id.substring(0, 12)}...</td>
                <td>${s.channel || '—'}</td>
                <td>${s.message_count || 0}</td>
                <td class="mono">${s.created_at ? new Date(s.created_at).toLocaleString() : '—'}</td>
                <td>${s.active ? '<span class="badge badge-connected">active</span>' : '<span class="badge badge-disconnected">inactive</span>'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    async function loadFiles() {
      try {
        const res = await fetch('/api/agents/' + encodeURIComponent(agentID) + '/files');
        if (!res.ok) throw new Error();
        const data = await res.json();
        renderFiles(Array.isArray(data) ? data : [data]);
      } catch (e) {
        document.getElementById('files-list').innerHTML = '<p class="error">Failed to load files</p>';
      }
    }

    function renderFiles(files) {
      const container = document.getElementById('files-list');
      if (!files.length) {
        container.innerHTML = '<p class="no-data">No files found</p>';
        return;
      }
      container.innerHTML = files.map(f => `
        <div class="file-row">
          <span class="file-icon">${f.is_dir ? '📁' : '📄'}</span>
          <span class="file-name">${f.name}${f.masked ? ' [masked]' : ''}</span>
          <div class="file-meta">
            <span class="mono">${f.modified ? new Date(f.modified).toLocaleString() : '—'}</span>
          </div>
        </div>
      `).join('');
    }

    async function loadSkills() {
      try {
        const res = await fetch('/api/agents/' + encodeURIComponent(agentID) + '/skills');
        if (!res.ok) throw new Error();
        const data = await res.json();
        renderSkills(Array.isArray(data) ? data : [data]);
      } catch (e) {
        document.getElementById('skills-list').innerHTML = '<p class="error">Failed to load skills</p>';
      }
    }

    function renderSkills(skills) {
      const container = document.getElementById('skills-list');
      if (!skills.length) {
        container.innerHTML = '<p class="no-data">No skills found</p>';
        return;
      }
      container.innerHTML = skills.map(s => `
        <div class="skill-item">
          <div class="skill-name">${s.name}</div>
          <div class="skill-desc">${s.description || '—'}</div>
        </div>
      `).join('');
    }

    loadAgent();
  </script>
</body>
</html>
