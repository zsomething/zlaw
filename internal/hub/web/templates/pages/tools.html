<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hub Tools — zlaw</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; background: #f9fafb; color: #111; line-height: 1.5; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    header { background: #1e293b; color: #e2e8f0; padding: 0 1.5rem; }
    header nav { display: flex; align-items: center; height: 3rem; gap: 2rem; }
    header .logo { font-weight: 700; font-size: 1rem; color: #f8fafc; }
    header nav a { color: #94a3b8; }
    header nav a:hover { color: #f8fafc; }
    header nav a.active { color: #f8fafc; font-weight: 600; }
    main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
    .page-header { margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
    .page-header p { color: #64748b; margin-top: 0.25rem; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 1rem; overflow: hidden; }
    .tool-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; background: #f8fafc; border-bottom: 1px solid #e5e7eb; cursor: pointer; }
    .tool-header:hover { background: #f1f5f9; }
    .tool-name { font-weight: 600; font-family: ui-monospace, monospace; color: #2563eb; }
    .tool-badge { font-size: 0.7rem; background: #e0f2fe; color: #0369a1; padding: 0.15rem 0.5rem; border-radius: 9999px; text-transform: uppercase; letter-spacing: 0.05em; }
    .tool-body { padding: 1.25rem; display: none; }
    .tool-body.open { display: block; }
    .tool-description { color: #374151; margin-bottom: 1rem; }
    .params-title { font-size: 0.8rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .param { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 6px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; }
    .param:last-child { margin-bottom: 0; }
    .param-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem; }
    .param-name { font-family: ui-monospace, monospace; font-weight: 600; color: #1e293b; }
    .param-type { font-size: 0.75rem; color: #64748b; background: #e2e8f0; padding: 0.1rem 0.4rem; border-radius: 4px; }
    .param-required { font-size: 0.7rem; color: #dc2626; background: #fee2e2; padding: 0.1rem 0.4rem; border-radius: 4px; }
    .param-desc { font-size: 0.85rem; color: #64748b; }
    .no-params { color: #94a3b8; font-style: italic; font-size: 0.85rem; }
    .toggle-icon { font-size: 1.2rem; color: #94a3b8; transition: transform 0.2s; }
    .tool-header.open .toggle-icon { transform: rotate(180deg); }
    footer { text-align: center; padding: 2rem; color: #94a3b8; font-size: 0.8rem; }
  </style>
</head>
<body>
  <header>
    <nav>
      <span class="logo">zlaw</span>
      <a href="/">Overview</a>
      <a href="/tools" class="active">Hub Tools</a>
      <a href="/audit">Audit Log</a>
    </nav>
  </header>
  <main>
    <div class="page-header">
      <h1>Hub Tools</h1>
      <p>Global built-in tools available to all manager agents via the hub inbox.</p>
    </div>
    <div id="tools-list">
      <p style="color:#64748b; text-align:center; padding:2rem;">Loading...</p>
    </div>
  </main>
  <footer>
    zlaw hub — read-only
  </footer>
  <script>
    async function loadTools() {
      try {
        const res = await fetch('/api/tools');
        if (!res.ok) throw new Error('Failed to load tools');
        const tools = await res.json();
        renderTools(tools);
      } catch (e) {
        document.getElementById('tools-list').innerHTML =
          '<p style="color:#dc2626; text-align:center;">Error loading tools</p>';
      }
    }

    function renderTools(tools) {
      const container = document.getElementById('tools-list');
      if (!tools.length) {
        container.innerHTML = '<p style="color:#94a3b8; text-align:center;">No hub tools available</p>';
        return;
      }

      // Sort alphabetically ascending
      tools.sort((a, b) => a.name.localeCompare(b.name));

      container.innerHTML = tools.map(tool => {
        const params = tool.parameters && tool.parameters.length > 0
          ? tool.parameters.map(p => `
            <div class="param">
              <div class="param-header">
                <span class="param-name">${p.name}</span>
                <span class="param-type">${p.type}</span>
                ${p.required ? '<span class="param-required">required</span>' : ''}
              </div>
              <div class="param-desc">${p.description}</div>
            </div>
          `).join('')
          : '<p class="no-params">No parameters</p>';

        return `
        <div class="card">
          <div class="tool-header" onclick="toggleTool(this)">
            <div style="display:flex;align-items:center;gap:0.75rem;">
              <span class="tool-name">${tool.name}</span>
              <span class="tool-badge">hub-level</span>
            </div>
            <span class="toggle-icon">▾</span>
          </div>
          <div class="tool-body">
            <p class="tool-description">${tool.description}</p>
            <p class="params-title">Parameters</p>
            ${params}
          </div>
        </div>
        `;
      }).join('');
    }

    function toggleTool(header) {
      header.classList.toggle('open');
      header.nextElementSibling.classList.toggle('open');
    }

    loadTools();
  </script>
</body>
</html>
