<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Skills — zlaw</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; background: #f9fafb; color: #111; line-height: 1.5; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    header { background: #1e293b; color: #e2e8f0; padding: 0 1.5rem; }
    header nav { display: flex; align-items: center; height: 3rem; gap: 2rem; }
    header .logo { font-weight: 700; font-size: 1rem; color: #f8fafc; }
    header nav a { color: #94a3b8; }
    header nav a:hover { color: #f8fafc; }
    header nav a.active { color: #f8fafc; font-weight: 600; }
    main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
    .page-header { margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
    .page-header p { color: #64748b; margin-top: 0.25rem; }
    .selector { margin-bottom: 1.5rem; }
    .selector label { font-weight: 600; color: #374151; margin-right: 0.5rem; }
    .selector select { padding: 0.5rem 2rem 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.9rem; background: #fff; cursor: pointer; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 0.75rem; overflow: hidden; }
    .skill-header { display: flex; align-items: center; justify-content: space-between; padding: 0.875rem 1rem; background: #f8fafc; border-bottom: 1px solid transparent; cursor: pointer; }
    .skill-header:hover { background: #f1f5f9; }
    .skill-header.open { border-bottom-color: #e5e7eb; }
    .skill-name { font-weight: 600; color: #1e293b; }
    .skill-body { padding: 1rem; display: none; }
    .skill-body.open { display: block; }
    .skill-description { color: #374151; margin-bottom: 1rem; }
    .skill-meta { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .skill-meta-item { font-size: 0.8rem; }
    .skill-meta-item .label { color: #64748b; }
    .skill-meta-item .mono { font-family: ui-monospace, monospace; font-size: 0.85em; background: #f1f5f9; padding: 0.1rem 0.3rem; border-radius: 4px; }
    .badge { display: inline-flex; align-items: center; padding: 0.2rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
    .badge-builtin { background: #e0f2fe; color: #0c4a6e; }
    .badge-file { background: #f3e8ff; color: #6b21a8; }
    .badge-plugin { background: #fef3c7; color: #92400e; }
    .badge-enabled { background: #dcfce7; color: #166534; }
    .badge-disabled { background: #fee2e2; color: #991b1b; }
    .no-skills { color: #94a3b8; text-align: center; padding: 2rem; }
    .toggle-icon { font-size: 1rem; color: #94a3b8; transition: transform 0.2s; }
    .skill-header.open .toggle-icon { transform: rotate(180deg); }
    footer { text-align: center; padding: 2rem; color: #94a3b8; font-size: 0.8rem; }
  </style>
</head>
<body>
  <header>
    <nav>
      <span class="logo">zlaw</span>
      <a href="/">Overview</a>
      <a href="/tools">Hub Tools</a>
      <a href="/agents">Agents</a>
      <a href="/agents/tools">Agent Tools</a>
      <a href="/agents/skills" class="active">Skills</a>
      <a href="/audit">Audit Log</a>
    </nav>
  </header>
  <main>
    <div class="page-header">
      <h1>Agent Skills</h1>
      <p>Skills available to each agent with source paths.</p>
    </div>
    <div class="selector">
      <label for="agent-select">Agent:</label>
      <select id="agent-select">
        <option value="">— Select agent —</option>
      </select>
    </div>
    <div id="skills-list">
      <p style="color:#64748b; text-align:center; padding:2rem;">Select an agent to view skills</p>
    </div>
  </main>
  <footer>
    zlaw hub — read-only
  </footer>
  <script>
    let selectedAgent = '';
    let allAgents = [];

    async function loadAgents() {
      try {
        const res = await fetch('/api/agents');
        if (!res.ok) throw new Error('Failed to load agents');
        const data = await res.json();
        allAgents = Array.isArray(data) ? data : [data];
        populateAgentSelect(allAgents);
      } catch (e) {}
    }

    function populateAgentSelect(agents) {
      const select = document.getElementById('agent-select');
      agents.forEach(agent => {
        const opt = document.createElement('option');
        opt.value = agent.Name;
        opt.textContent = agent.Name;
        select.appendChild(opt);
      });
    }

    async function loadSkills() {
      if (!selectedAgent) return;
      try {
        const res = await fetch('/api/agents/skills?agent=' + encodeURIComponent(selectedAgent));
        if (!res.ok) throw new Error('Failed to load skills');
        const data = await res.json();
        renderSkills(Array.isArray(data) ? data : [data]);
      } catch (e) {
        document.getElementById('skills-list').innerHTML = '<p style="color:#dc2626; text-align:center;">Error loading skills</p>';
      }
    }

    function renderSkills(skills) {
      const container = document.getElementById('skills-list');
      if (!skills.length) {
        container.innerHTML = '<p class="no-skills">No skills available for this agent</p>';
        return;
      }

      container.innerHTML = skills.map(skill => {
        const typeBadge = skill.type === 'builtin' ? '<span class="badge badge-builtin">built-in</span>'
          : skill.type === 'file' ? '<span class="badge badge-file">file-based</span>'
          : '<span class="badge badge-plugin">plugin</span>';
        const enabledBadge = skill.enabled ? '<span class="badge badge-enabled">enabled</span>'
          : '<span class="badge badge-disabled">disabled</span>';

        return `
        <div class="card">
          <div class="skill-header" onclick="toggleSkill(this)">
            <span class="skill-name">${skill.name}</span>
            <span>${typeBadge} ${enabledBadge} <span class="toggle-icon">▾</span></span>
          </div>
          <div class="skill-body">
            <p class="skill-description">${skill.description || '—'}</p>
            <div class="skill-meta">
              <div class="skill-meta-item">
                <span class="label">Source: </span>
                <span class="mono">${skill.path || '—'}</span>
              </div>
            </div>
          </div>
        </div>
        `;
      }).join('');
    }

    function toggleSkill(header) {
      header.classList.toggle('open');
      header.nextElementSibling.classList.toggle('open');
    }

    document.getElementById('agent-select').addEventListener('change', async function(e) {
      selectedAgent = e.target.value;
      if (!selectedAgent) {
        document.getElementById('skills-list').innerHTML = '<p style="color:#64748b; text-align:center; padding:2rem;">Select an agent to view skills</p>';
        return;
      }
      document.getElementById('skills-list').innerHTML = '<p style="color:#64748b; text-align:center; padding:2rem;">Loading...</p>';
      await loadSkills();
    });

    loadAgents();
  </script>
</body>
</html>
