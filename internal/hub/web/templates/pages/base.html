<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="htmx-config" content='{"includeIndicatorStyles": false, "defaultSwapStyle": "innerHTML", "defaultSettleDuration": 150}'>
  <title>{% block title %}zlaw{% endblock %}</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- DaisyUI (CSS only, JS not required) -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
  
  <!-- HTMX v2 -->
  <script src="https://unpkg.com/htmx.org@2/dist/htmx.min.js"></script>
  
  <!-- Tailwind config for DaisyUI themes -->
  <script>
    tailwind.config {
      plugins: [require('daisyui')],
      daisyui: {
        themes: ['light', 'dark', 'cupcake', 'bumblebee', 'emerald', 'corporate', 'synthwave', 'retro', 'cyberpunk', 'valentine', 'halloween', 'garden', 'forest', 'aqua', 'lofi', 'pastel', 'fantasy', 'wireframe', 'black', 'luxury', 'dracula', 'cmyk', 'autumn', 'business', 'acid', 'lemonade', 'night', 'coffee', 'winter', 'dim', 'nord', 'sunset'],
      }
    }
  </script>
  
  <!-- Page transition styles -->
  <style>
    /* Smooth page content transitions */
    #page-content {
      animation: fadeIn 150ms ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Settling animation for htmx swaps */
    .htmx-settling {
      animation: settleIn 150ms ease-out;
    }
    @keyframes settleIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    /* HTMX content additions */
    .htmx-added {
      animation: slideIn 200ms ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    /* Error states */
    .htmx-error {
      @apply bg-error/10 border border-error/30 rounded-lg p-4;
    }
    
    /* Loading state during requests */
    .loading-soft {
      @apply opacity-60 pointer-events-none;
      transition: opacity 200ms ease;
    }
    
    {% block styles %}{% endblock %}
  </style>
</head>
<body class="min-h-screen bg-base-200" hx-boost="true">
  
  <!-- Navbar -->
  <header class="navbar bg-base-100 shadow-sm sticky top-0 z-50">
    <div class="flex-1">
      <a href="/" class="btn btn-ghost text-xl font-bold">⚡ zlaw</a>
    </div>
    <div class="flex-none">
      <ul class="menu menu-horizontal px-1 gap-1">
        <li><a href="/" hx-target="#page-content" hx-push-url="true" class="{% if request_path == '/' %}active{% endif %}">Overview</a></li>
        <li><a href="/tools" hx-target="#page-content" hx-push-url="true" class="{% if request_path == '/tools' %}active{% endif %}">Tools</a></li>
        <li><a href="/agents" hx-target="#page-content" hx-push-url="true" class="{% if request_path == '/agents' %}active{% endif %}">Agents</a></li>
        <li><a href="/audit" hx-target="#page-content" hx-push-url="true" class="{% if request_path == '/audit' %}active{% endif %}">Audit</a></li>
      </ul>
      <!-- Theme switcher -->
      <div class="dropdown dropdown-end ml-2">
        <div tabindex="0" role="button" class="btn btn-ghost btn-sm">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
          </svg>
        </div>
        <ul tabindex="0" class="dropdown-content z-[1] menu p-2 shadow bg-base-100 rounded-box w-52">
          <li><a onclick="document.documentElement.setAttribute('data-theme', 'light')" class="{% if current_theme == 'light' %}active{% endif %}">☀️ Light</a></li>
          <li><a onclick="document.documentElement.setAttribute('data-theme', 'dark')" class="{% if current_theme == 'dark' %}active{% endif %}">🌙 Dark</a></li>
          <li><a onclick="document.documentElement.setAttribute('data-theme', 'cupcake')" class="{% if current_theme == 'cupcake' %}active{% endif %}">🧁 Cupcake</a></li>
          <li><a onclick="document.documentElement.setAttribute('data-theme', 'dracula')" class="{% if current_theme == 'dracula' %}active{% endif %}">🧛 Dracula</a></li>
          <li><a onclick="document.documentElement.setAttribute('data-theme', 'synthwave')" class="{% if current_theme == 'synthwave' %}active{% endif %}">🌆 Synthwave</a></li>
        </ul>
      </div>
    </div>
  </header>
  
  <!-- Main content -->
  <main class="container mx-auto px-4 py-6 max-w-7xl">
    {% block content %}{% endblock %}
  </main>
  
  <!-- Footer -->
  <footer class="footer footer-center p-6 bg-base-100 text-base-content mt-auto">
    <aside>
      <p class="text-sm opacity-60">zlaw hub — read-only dashboard</p>
    </aside>
  </footer>
  
  {% block scripts %}{% endblock %}
  
  <!-- HTMX event handlers (htmx v2 style) -->
  <script>
    // Page transition loading state
    document.body.addEventListener('htmx:beforeRequest', function(evt) {
      const target = evt.detail.target;
      if (target && target.closest) {
        const pageContent = document.getElementById('page-content');
        if (pageContent && (target === document.body || target.closest('[hx-boost]'))) {
          pageContent.classList.add('loading-soft');
        }
      }
    });
    
    document.body.addEventListener('htmx:afterRequest', function(evt) {
      const pageContent = document.getElementById('page-content');
      if (pageContent) {
        pageContent.classList.remove('loading-soft');
      }
    });
    
    // Error handling for requests
    document.body.addEventListener('htmx:responseError', function(evt) {
      const target = evt.detail.target;
      if (target && target.closest) {
        const container = target.closest('[id]');
        if (container && !container.querySelector('.htmx-error')) {
          container.insertAdjacentHTML('beforeend', 
            '<div class="htmx-error mt-4">' +
            '<strong>Error:</strong> Failed to load content. ' +
            '<button hx-get="' + window.location.pathname + '" hx-target="#page-content" class="btn btn-sm btn-error">Retry</button>' +
            '</div>'
          );
        }
      }
    });
    
    // Swap error handling
    document.body.addEventListener('htmx:swapError', function(evt) {
      console.error('Swap error:', evt.detail);
    });
    
    // Restore theme from localStorage on load
    const savedTheme = localStorage.getItem('zlaw-theme');
    if (savedTheme) {
      document.documentElement.setAttribute('data-theme', savedTheme);
    }
    
    // Save theme to localStorage on change
    const observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(mutation) {
        if (mutation.attributeName === 'data-theme') {
          localStorage.setItem('zlaw-theme', document.documentElement.getAttribute('data-theme'));
        }
      });
    });
    observer.observe(document.documentElement, { attributes: true });
  </script>
</body>
</html>
