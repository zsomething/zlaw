<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agents — zlaw</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; background: #f9fafb; color: #111; line-height: 1.5; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    header { background: #1e293b; color: #e2e8f0; padding: 0 1.5rem; }
    header nav { display: flex; align-items: center; height: 3rem; gap: 2rem; }
    header .logo { font-weight: 700; font-size: 1rem; color: #f8fafc; }
    header nav a { color: #94a3b8; }
    header nav a:hover { color: #f8fafc; }
    header nav a.active { color: #f8fafc; font-weight: 600; }
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    .page-header { margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 1rem; overflow: hidden; }
    .card-header { padding: 1rem 1.25rem; background: #f8fafc; border-bottom: 1px solid #e5e7eb; }
    .card-header h2 { font-size: 1rem; font-weight: 600; color: #374151; }
    .agent-card { padding: 1.25rem; border-bottom: 1px solid #f1f5f9; }
    .agent-card:last-child { border-bottom: none; }
    .agent-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .agent-name { font-weight: 600; font-size: 1.1rem; color: #1e293b; }
    .badge { display: inline-flex; align-items: center; padding: 0.2rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
    .badge-running { background: #dcfce7; color: #166534; }
    .badge-connected { background: #dcfce7; color: #166534; }
    .badge-disconnected { background: #fee2e2; color: #991b1b; }
    .agent-stats { display: flex; gap: 2rem; flex-wrap: wrap; }
    .agent-stat { }
    .agent-stat .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .agent-stat .value { font-weight: 500; color: #374151; }
    .mono { font-family: ui-monospace, monospace; font-size: 0.85em; }
    .agent-links { margin-top: 0.75rem; display: flex; gap: 1rem; flex-wrap: wrap; }
    .agent-links a { font-size: 0.85rem; color: #2563eb; }
    .agent-links a:hover { text-decoration: underline; }
    .no-agents { color: #94a3b8; text-align: center; padding: 2rem; }
    footer { text-align: center; padding: 2rem; color: #94a3b8; font-size: 0.8rem; }
  </style>
</head>
<body>
  <header>
    <nav>
      <span class="logo">zlaw</span>
      <a href="/">Overview</a>
      <a href="/tools">Hub Tools</a>
      <a href="/agents" class="active">Agents</a>
      <a href="/agents/tools">Agent Tools</a>
      <a href="/audit">Audit Log</a>
    </nav>
  </header>
  <main>
    <div class="page-header">
      <h1>Agents</h1>
      <p>Registered agents in this hub.</p>
    </div>
    <div id="agents-list">
      <p style="color:#64748b; text-align:center; padding:2rem;">Loading...</p>
    </div>
  </main>
  <footer>
    zlaw hub — read-only
  </footer>
  <script>
    async function loadAgents() {
      try {
        const res = await fetch('/api/agents');
        if (!res.ok) throw new Error('Failed to load agents');
        const data = await res.json();
        renderAgents(Array.isArray(data) ? data : [data]);
      } catch (e) {
        document.getElementById('agents-list').innerHTML =
          '<p style="color:#dc2626; text-align:center;">Error loading agents</p>';
      }
    }

    function renderAgents(agents) {
      const container = document.getElementById('agents-list');
      
      if (!agents.length) {
        container.innerHTML = '<p class="no-agents">No agents registered</p>';
        return;
      }

      container.innerHTML = agents.map(agent => {
        const statusBadge = agent.Running 
          ? '<span class="badge badge-running">running</span>'
          : agent.Status === 'connected'
            ? '<span class="badge badge-connected">connected</span>'
            : '<span class="badge badge-disconnected">' + (agent.Status || 'unknown') + '</span>';

        return `
        <div class="card">
          <div class="card-header">
            <h2>${agent.Name || 'Unknown'}</h2>
          </div>
          <div class="agent-card">
            <div class="agent-header">
              <span class="agent-name">${agent.Name || 'Unknown'}</span>
              ${statusBadge}
            </div>
            <div class="agent-stats">
              <div class="agent-stat">
                <div class="label">PID</div>
                <div class="value mono">${agent.PID || '—'}</div>
              </div>
              <div class="agent-stat">
                <div class="label">Version</div>
                <div class="value mono">${agent.Version || '—'}</div>
              </div>
              <div class="agent-stat">
                <div class="label">Last Heartbeat</div>
                <div class="value mono">${agent.LastHeartbeat ? new Date(agent.LastHeartbeat).toLocaleString() : '—'}</div>
              </div>
            </div>
            <div class="agent-links">
              <a href="/agents/tools?agent=${encodeURIComponent(agent.Name)}">Tools</a>
              <a href="/agents/sessions?agent=${encodeURIComponent(agent.Name)}">Sessions</a>
              <a href="/agents/files?agent=${encodeURIComponent(agent.Name)}">Workspace Files</a>
              <a href="/agents/skills?agent=${encodeURIComponent(agent.Name)}">Skills</a>
            </div>
          </div>
        </div>
        `;
      }).join('');
    }

    loadAgents();
  </script>
</body>
</html>
