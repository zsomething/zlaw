<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Workspace Files — zlaw</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; background: #f9fafb; color: #111; line-height: 1.5; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    header { background: #1e293b; color: #e2e8f0; padding: 0 1.5rem; }
    header nav { display: flex; align-items: center; height: 3rem; gap: 2rem; }
    header .logo { font-weight: 700; font-size: 1rem; color: #f8fafc; }
    header nav a { color: #94a3b8; }
    header nav a:hover { color: #f8fafc; }
    header nav a.active { color: #f8fafc; font-weight: 600; }
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    .page-header { margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
    .page-header p { color: #64748b; margin-top: 0.25rem; }
    .selector { margin-bottom: 1.5rem; }
    .selector label { font-weight: 600; color: #374151; margin-right: 0.5rem; }
    .selector select { padding: 0.5rem 2rem 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.9rem; background: #fff; cursor: pointer; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 1rem; overflow: hidden; }
    .card-header { padding: 1rem 1.25rem; background: #f8fafc; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
    .card-header h2 { font-size: 1rem; font-weight: 600; color: #374151; }
    .file-row { display: flex; align-items: center; padding: 0.75rem 1rem; border-bottom: 1px solid #f1f5f9; }
    .file-row:last-child { border-bottom: none; }
    .file-row:hover { background: #f8fafc; cursor: pointer; }
    .file-icon { margin-right: 0.75rem; color: #64748b; width: 1.25rem; text-align: center; }
    .file-icon.folder { color: #f59e0b; }
    .file-name { flex: 1; font-weight: 500; color: #374151; }
    .file-meta { display: flex; gap: 1.5rem; color: #64748b; font-size: 0.8rem; }
    .file-meta .mono { font-family: ui-monospace, monospace; font-size: 0.85em; }
    .badge { display: inline-flex; align-items: center; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.7rem; font-weight: 500; }
    .badge-masked { background: #fef3c7; color: #92400e; }
    .file-preview { display: none; }
    .file-preview.open { display: block; }
    .file-preview-header { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; background: #f1f5f9; border-bottom: 1px solid #e5e7eb; }
    .file-preview-content { padding: 1rem; font-size: 0.85rem; white-space: pre-wrap; word-break: break-word; max-height: 400px; overflow-y: auto; background: #f8fafc; }
    .close-btn { background: none; border: none; cursor: pointer; color: #64748b; font-size: 1.25rem; padding: 0; }
    .close-btn:hover { color: #374151; }
    footer { text-align: center; padding: 2rem; color: #94a3b8; font-size: 0.8rem; }
  </style>
</head>
<body>
  <header>
    <nav>
      <span class="logo">zlaw</span>
      <a href="/">Overview</a>
      <a href="/tools">Hub Tools</a>
      <a href="/agents">Agents</a>
      <a href="/agents/tools">Agent Tools</a>
      <a href="/agents/files" class="active">Workspace Files</a>
      <a href="/audit">Audit Log</a>
    </nav>
  </header>
  <main>
    <div class="page-header">
      <h1>Workspace Files</h1>
      <p>Browse agent workspace files.</p>
    </div>
    <div class="selector">
      <label for="agent-select">Agent:</label>
      <select id="agent-select">
        <option value="">— Select agent —</option>
      </select>
    </div>

    <div id="files-view" style="display:none;">
      <div class="card">
        <div class="card-header">
          <h2>Files</h2>
        </div>
        <div id="files-list">
          <p style="color:#94a3b8; text-align:center; padding:2rem;">Loading...</p>
        </div>
      </div>
      <div id="file-preview" class="card file-preview">
        <div class="file-preview-header">
          <span id="preview-filename" class="mono"></span>
          <button class="close-btn" onclick="closePreview()">×</button>
        </div>
        <pre id="preview-content" class="file-preview-content"></pre>
      </div>
    </div>
  </main>
  <footer>
    zlaw hub — read-only
  </footer>
  <script>
    let selectedAgent = '';
    let filesData = {};
    let allAgents = [];

    async function loadAgents() {
      try {
        const res = await fetch('/api/agents');
        if (!res.ok) throw new Error('Failed to load agents');
        const data = await res.json();
        allAgents = Array.isArray(data) ? data : [data];
        populateAgentSelect(allAgents);
      } catch (e) {}
    }

    function populateAgentSelect(agents) {
      const select = document.getElementById('agent-select');
      agents.forEach(agent => {
        const opt = document.createElement('option');
        opt.value = agent.Name;
        opt.textContent = agent.Name;
        select.appendChild(opt);
      });
    }

    async function loadFiles() {
      if (!selectedAgent) return;
      try {
        const res = await fetch('/api/agents/files?agent=' + encodeURIComponent(selectedAgent));
        if (!res.ok) throw new Error('Failed to load files');
        const data = await res.json();
        filesData = {};
        (Array.isArray(data) ? data : [data]).forEach(f => filesData[f.path] = f);
        renderFiles(Array.isArray(data) ? data : [data]);
      } catch (e) {
        document.getElementById('files-list').innerHTML = '<p style="color:#dc2626; text-align:center;">Error loading files</p>';
      }
    }

    function renderFiles(files) {
      const container = document.getElementById('files-list');
      if (!files.length) {
        container.innerHTML = '<p style="color:#94a3b8; text-align:center;">No files found</p>';
        return;
      }

      // Sort: dirs first, then by name
      files.sort((a, b) => {
        if (a.is_dir && !b.is_dir) return -1;
        if (!a.is_dir && b.is_dir) return 1;
        return a.name.localeCompare(b.name);
      });

      container.innerHTML = files.map(f => {
        const icon = f.is_dir ? '📁' : '📄';
        const size = f.is_dir ? '' : formatSize(f.size);
        const masked = f.masked ? ' <span class="badge badge-masked">masked</span>' : '';
        return `
        <div class="file-row" onclick="showPreview('${escapeAttr(f.path)}')">
          <span class="file-icon ${f.is_dir ? 'folder' : ''}">${icon}</span>
          <span class="file-name">${f.name}${masked}</span>
          <div class="file-meta">
            <span>${size}</span>
            <span class="mono">${f.modified ? new Date(f.modified).toLocaleString() : '—'}</span>
          </div>
        </div>
        `;
      }).join('');
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function showPreview(path) {
      const file = filesData[path];
      if (!file || file.is_dir) return;
      document.getElementById('preview-filename').textContent = file.name;
      document.getElementById('preview-content').textContent = file.content || '(no content)';
      document.getElementById('file-preview').classList.add('open');
    }

    function closePreview() {
      document.getElementById('file-preview').classList.remove('open');
    }

    function escapeAttr(str) {
      return str.replace(/'/g, "\\'");
    }

    document.getElementById('agent-select').addEventListener('change', async function(e) {
      selectedAgent = e.target.value;
      if (!selectedAgent) {
        document.getElementById('files-view').style.display = 'none';
        return;
      }
      document.getElementById('files-view').style.display = 'block';
      closePreview();
      await loadFiles();
    });

    loadAgents();
  </script>
</body>
</html>
