<!-- Tool list partial for htmx swap -->
{% if Tools %}
  {% for tool in Tools %}
  <div class="collapse collapse-arrow bg-base-100 border border-base-300 mb-2">
    <input type="checkbox" /> 
    <div class="collapse-title font-mono font-semibold text-primary">
      {{ tool.Name }}
    </div>
    <div class="collapse-content"> 
      <p class="text-sm text-base-content/70 mb-2">{{ tool.Description|default:"No description available" }}</p>
      {% if tool.Parameters %}
      <div class="text-xs">
        <span class="font-semibold opacity-60">Parameters:</span>
        <code class="block mt-1 p-2 bg-base-200 rounded">{{ tool.Parameters }}</code>
      </div>
      {% endif %}
    </div>
  </div>
  {% endfor %}
{% else %}
  <div class="text-center py-8 text-base-content/50">
    <div class="text-4xl mb-2">🔧</div>
    No tools available
  </div>
{% endif %}
